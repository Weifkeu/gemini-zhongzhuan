# 工作流名称，可自定义
name: Gemini API 调用测试

# 触发方式：手动触发（在GitHub Actions页面点击"Run workflow"）
on:
  workflow_dispatch:

# 定义任务
jobs:
  call-gemini-api:
    # 运行环境：Ubuntu最新版（GitHub Actions默认环境）
    runs-on: ubuntu-latest
    steps:
      # 步骤1：打印提示信息（可选，方便看执行状态）
      - name: 开始调用Gemini API
        run: echo "开始请求Gemini中转API..."

      # 步骤2：核心-调用Gemini中转API
      - name: 调用Gemini 2.5 Flash模型
        run: |
          # 使用curl发送POST请求，适配OpenAI兼容格式
          curl -X POST "https://gemini.234cs.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GEMINI_API_KEY }}" \
            -d '{
              "model": "gemini-2.5-flash",  # 替换为额度充足的最新模型
              "messages": [
                {"role": "user", "content": "你好，请简单介绍一下自己"}
              ],
              "temperature": 0.7,  # 回答随机性，0-1之间
              "max_tokens": 1000   # 最大回复长度
            }'
          # 打印结束提示
          echo "API调用完成！"
