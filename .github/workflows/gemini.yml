name: Gemini API 调用测试

on:
  workflow_dispatch:

jobs:
  call-gemini-api:
    runs-on: ubuntu-latest
    steps:
      - name: 开始调用Gemini API
        run: echo "开始请求Gemini中转API..."

      - name: 调用Gemini 2.5 Flash模型
        run: |
          curl -X POST "https://gemini.234cs.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GEMINI_API_KEY }}" \
            -d '{
              "model": "gemini-2.5-flash",
              "messages": [{"role": "user", "content": "你好，请简单介绍一下自己"}],
              "temperature": 0.7,
              "max_tokens": 1000
            }'
          echo "API调用完成！"
