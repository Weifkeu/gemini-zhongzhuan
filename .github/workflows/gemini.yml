name: 测试Gemini中转API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 调用Gemini API
        run: |
          curl "https://gemini.234cs.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GEMINI_API_KEY }}" \
            -d '{
              "model": "gemini-2.0-flash",
              "messages": [{"role":"user","content":"你好"}]
            }'
